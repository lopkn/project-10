<!DOCTYPE html>
<html>
<head>

<style>

body{

.page{

}

.center{
    min-height:100vh;

    justify-content:center;

    text-align:center;
}

h1{
    font-size:3rem;

}

.subtitle{

input[type=number]{

button{

.tree{

.node{

.nodeTitle{

}

.yearsLabel{

.children{

.finalMessage{

.toggle{

.range{

.description{

.yearsLabel{

}

    .newsTicker{
        position:sticky;
        top:0;
        left:0;
        width:100%;
        display:flex;
        align-items:center;
        gap:12px;
        padding:14px 24px;
        background:rgba(0,0,0,.35);
        backdrop-filter:blur(10px);
        border-bottom:1px solid rgba(255,255,255,.12);
        z-index:10;
    }

    .tickerLabel{
        opacity:.75;
        text-transform:uppercase;
        letter-spacing:.12em;
        font-size:.85rem;
        white-space:nowrap;
    }

    .tickerText{
        flex:1;
        opacity:0;
        transition:opacity .8s ease;
    }

    .tickerText.visible{
        opacity:1;
    }

    .hidden{
    display:none;
    }
</style>
</head>
<body>

<div id="newsTicker" class="newsTicker hidden">
    <div class="tickerLabel">REMINDER:</div>

</div>

<div id="landing" class="center">

    <h1>How Long Would You Live?</h1>

    <div class="subtitle">
        If a pill safely extended your life by one year,<br>

    </div>

</div>

<div id="planner" class="page hidden">

    <!-- <div class="finalMessage">

        far more time than you originally thought.
    </div> -->

</div>

<script>

let purchasedYears = 0;

const data = [
{

    years:0,
    defaultSpendable:100,
    children:[
        // {
        //     name:"Piano",

    ]

// },
{

},{
    name:"People",
    defaultSpendable:100,
    years:0,
    children:[]
}

function attemptGet(name){
    name = name.toLowerCase();
    let search = data
    for(let i = 0; i < search.length; i++){
        const node = search[i];
        if(node.name.toLowerCase() === name){
            return node;
        }
        search = search.concat(node.children);
    }
}


let mode = "push"

function addChild(node,name){
    if(typeof node === "string"){
        node = attemptGet(node);
    }
    let child = {
        name,
        years:0,
        children:[]
    };
    if(mode === "push"){
        node.children.push(child);
    } else if(mode === "unshift"){
        node.children.unshift(child);
    }
    return child;
}
Object.prototype.addChild = function(...name){
    if(Array.isArray(name)){
        let arr = [];
        for(const n of name){
            last = arr.push(addChild(this,n));
        }
        return arr;
    }
    throw new Error("addChild only accepts array of names");
}

Array.prototype.addChild = function(...name){
    let arr = [];
    for(const n of this){
        arr = arr.concat(n.addChild(...name));
    }
    return arr;
}

Object.prototype.require = function(node,years){
    if(typeof node === "string"){
        node = attemptGet(node);
    }
    
    if(this.requires === undefined){
        this.requires = new Map();
    }

    this.requires.set(node,years);

    if(node.requiredBy === undefined){
        node.requiredBy = new Map();
    }
    node.requiredBy.set(this,years);

    return(this)

}

Object.prototype.describe = function(func){
    this.dynamicDescription = func;
    return(this);
}

Array.prototype.describe = function(func){
    for(const node of this){
        node.describe(func);
    }
    return(this);
}

Object.prototype.maxRange = function(val){
    this.defaultSpendable = val;
    return(this);
}

Array.prototype.maxRange = function(val){
    for(const node of this){
        node.maxRange(val);
    }
    return(this);
}




var descriptionFuncs = {
    "general skill":(node)=>{
        let years = node.years;
        if(years === 0){return("Not started")}
        if(years === 1){return("Dog water")}
        if(years === 2){return("Novice")}
        if(years === 3){return("Intermediate")}
        if(years === 4){return("pretty good")}
        if(years === 5){return("Expert")}
        if(years < 9){return("Mastery, except you spent years mastering a skill but then only spent a total of "+years+" years on it in your lifetime")}
        return("Mastery")
    },
    "language":(node)=>{
        let years = node.years;
        if(years === 0){return("Not started")}
        if(years === 1){return("Dog water")}
        if(years === 2){return("Novice")}
        if(years === 3){return("Intermediate")}
        if(years === 4){return("pretty good")}
        if(years < 8){return("Fluent")}
        return("Linguistic virtuoso")
    },
    "dating":(node)=>{
        let years = node.years;
        if(years === 0){return("No bitches")}
        if(years === 1){return("ugly fuck")}
        if(years === 2){return("like a 6")}
        if(years < 5){return("nice partner")}
        return("soulmate")


    }
}


let system = attemptGet("travel").addChild("Solar system").addChild("moon","mars","mercury","titan","venus","ceres","ganymede","europa","callisto");
system.addChild("visit")
t = system.addChild("build")
t.addChild("biodome","hotel","spaceport")
t = t.addChild("low gravity pool");
t.addChild("wave pool","space volleyball court")
// t = temp
mode = "unshift";
t = attemptGet("travel").addChild("Earth tour")
t=t.addChild("asia","europe","america","africa","australia","arctic","antarctica");
t.addChild("settle","build")
t = t.addChild("visit")


mode = "push";


t = attemptGet("interests/careers").addChild("Arts/music")
t.addChild("Drawing").addChild("oil","watercolor","digital").describe(descriptionFuncs["general skill"]);
t=t.addChild("Music").addChild("Piano","Guitar","Singing","Composing").describe(descriptionFuncs["general skill"]);
t.addChild("performing","composing")
t = attemptGet("interests/careers").addChild("Programming").addChild("Web","Mobile","Game","AI");
t.addChild("Build projects","Contribute to open source","Lead a team","Start a company")
t = attemptGet("interests/careers").addChild("Sports").addChild("Basketball","Soccer","Tennis","baseball","shuttle COCK").describe(descriptionFuncs["general skill"]);
t = attemptGet("interests/careers").addChild("Cooking").addChild("Baking","Grilling","Gourmet").describe(descriptionFuncs["general skill"]);



t = attemptGet("interests/careers").addChild("Tech").addChild("Software Engineer","Data Scientist","Product Manager","UX Designer");
t.addChild("Learn basics","Join a company","Lead a team","Start a company")
t = attemptGet("interests/careers").addChild("Medicine").addChild("Doctor");
t.addChild("pre-med","medical school","residency","fellowship")

attemptGet("medical school").require("pre-med",4)
attemptGet("residency").require("medical school",8)

attemptGet("medical school").dynamicDescription = (node)=>{
    if(node.years === 8){
        return "Completed med school. Ever thought of maybe spending more than 8 years so you arent so stressed during those 8 years?";
    } else if(node.years > 8){
        return "Completed med school";
    }
    return "Years left in med school: " + (8-node.years);
}

t = attemptGet("interests/careers").addChild("Education").addChild("Teacher","Professor","Education Researcher");

mode = "unshift";
t = attemptGet("interests/careers").addChild("Languages").addChild("Spanish","French","Mandarin","Japanese").describe(descriptionFuncs["language"]).maxRange(14);
t = attemptGet("interests/careers").addChild("Fun & entertainment")
mode = "push";
t.addChild("Video Games","Movies/TV","Books","Paintball","Airsoft","Trampolines","Tabletop games","Gambling","Gardening")


t = attemptGet("interests/careers").addChild("Research & knowledge").addChild("Biology","Physics","Math","Agriculture","Tech")

t = attemptGet("people").addChild("Family","Friends","Co workers").addChild("spending quality time")
t = attemptGet("family").addChild("find a partner","dating","kids")
attemptGet("find a partner").describe(descriptionFuncs["dating"])

class game{
    static locked = false;
}



function start(){

    purchasedYears =
        parseInt(
            document.getElementById("wishInput").value
        ) || 0;

    document
        .getElementById("landing")
        .classList
        .add("hidden");

    document
        .getElementById("planner")
        .classList
        .remove("hidden");

    document.getElementById("newsTicker").classList.remove("hidden")
    setTimeout(updateTicker,100)
    setInterval(updateTicker, 15000);

    renderTree();
    updateTotals();
}

function renderTree(){

    const root =
        document.getElementById("tree");

    root.innerHTML = "";

    data.forEach(node=>{
        root.appendChild(
            createNode(node)
        );
    });
}

function getParentNodeElm(node){
    if(node.parentNode?.parentNode?.classList.contains("node")){
        return node.parentNode.parentNode;
    }
    return null;
}


function spended(node){
    let total = 0;
    node.children.forEach(child=>{
        total += child.years;
    });
    return(total)
}

function spendCascade(val,node){
    node.years += val;
    valueUpdate(node)

    let parent = node.parent;
    if(!parent){
        return;
    }
    spendCascade(val,parent)
}

function valueUpdate(node){
    let range = node.elm.querySelector("input");
    range.max = Math.max(node.years,range.max);
    range.value = node.years;

    node.elm.querySelector("div.yearsLabel").textContent = node.years + " yrs";

    if(node.dynamicDescription){
        node.descriptionElm.textContent = node.dynamicDescription(node);
    }

}


function attemptSpend(node,val){

    //requirements
    if(node.requires){
        for(const [requireNode,requireYears] of node.requires.entries()){
            if(requireNode.years < requireYears){
                console.log("Requires " + requireYears + " years on " + requireNode.name);
                return -val;
            }
        }
    }


    let parent = node.parent;
    if(parent){
        let spendable = parent.years - spended(parent);
        if(spendable < 0){
            spendCascade(-spendable,parent);
        }
    }

    let notSpended = node.years - spended(node)

    return(-Math.min(0, notSpended))
}


function createNode(node,parent){


    node.parent = parent
    const div =
        document.createElement("div");

    div.className = "node";
    node.elm = div;

    const header =
        document.createElement("div");

    header.className = "nodeHeader";

    const toggle =
        document.createElement("span");

    toggle.className = "toggle";
    toggle.textContent =
        node.children.length ? "▶" : "•";

    header.appendChild(toggle);

    const title =
        document.createElement("div");

    title.className = "nodeTitle";
    title.textContent = node.name;

    header.appendChild(title);

    const range =
        document.createElement("input");

    range.type = "range";
    range.min = 0;
    range.max = node.defaultSpendable?node.defaultSpendable:20;
    range.value = node.years;
    range.className = "range";

    const label =
        document.createElement("div");

    label.classList.add("yearsLabel");

    label.className = "yearsLabel";
    label.textContent =
        node.years + " yrs";

    range.oninput = ()=>{
        node.years = Number(range.value)
        let as = attemptSpend(node,range.value);
        // range.value = Number(range.value) + as;
        node.years = Number(range.value) + as;
        // node.years = Number(range.value);


        valueUpdate(node);

        updateTotals(range);
    };


    let tempDiv = document.createElement("div");
    tempDiv.style.display = "flex";
    tempDiv.style.flexDirection = "column";
    tempDiv.appendChild(range);
    let description = document.createElement("label");
    description.className = "description";
    tempDiv.appendChild(description);
    header.appendChild(tempDiv);
    node.descriptionElm = description;

    
    header.appendChild(label);
    div.appendChild(header);

    const children =
        document.createElement("div");

    children.className = "children";

    node.children.forEach(child=>{
        children.appendChild(
            createNode(child,node)
        );
    });
    children.style.display = "none";

    if(node.children.length){toggle.onclick = ()=>{

        if(game.locked){
            if(node.years === 0){alert("Spend time on " + node.name + " to see its details");return}
        }

        children.style.display =
            children.style.display==="none"
            ? "block"
            : "none";

        toggle.textContent =
            children.style.display==="none"
            ? "▶"
            : "▼";
    };
}

    div.appendChild(children);

    return div;
}

function sumYears(node){

    let total = node.years;

    // for(const child of node.children){
    //     total += sumYears(child);
    // }

    return total;
}

function totalYears(){

    let total = 0;

    for(const node of data){
        total += sumYears(node);
    }

    return total;
}

function updateTotals(){

    const used =
        totalYears();

    document
        .getElementById("purchasedYears")
        .textContent =
        purchasedYears;

    document
        .getElementById("allocatedYears")
        .textContent =
        used;

    document
        .getElementById("remainingYears")
        .textContent =
        purchasedYears - used;
}

const tickerMessages = [
    "No one is going after you just because you live long. But wouldnt you want to build a private bunker just for fun?",
    "That's the amount of years you will spend TOTAL in your lifetime. Not just learning it",
    "You can still kill yourself anytime you feel truely bored with life",
    "Put a couple years into stuff you havent even tried. You might like it.",
    ""
];
let tickerIndex = 0;

function updateTicker(){
    const ticker = document.getElementById("tickerText");
    ticker.classList.remove("visible");
    void ticker.offsetWidth;
    setTimeout(()=>{
        ticker.textContent = tickerMessages[tickerIndex];
        ticker.classList.add("visible");

    },1000)
    tickerIndex = (tickerIndex + 1) % tickerMessages.length;
}


</script>

</body>
</html>
