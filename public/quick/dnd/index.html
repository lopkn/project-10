<!DOCTYPE html>
<html>
<head>
<title>String Collector</title>
<style>
    .string-box {
        margin: 8px 0;
        display: flex;
        gap: 8px;
        align-items: center;
    }

    .string-box-text{
      width:70vw;
    }

    .check{

    }

    #result {
        margin-top: 20px;
        white-space: pre-wrap;
        border: 1px solid #aaa;
        padding: 10px;
        min-height: 30px;
    }
</style>
</head>

<body>

<h2>String List</h2>

<div id="container"></div>

<button onclick="addBox()">Add</button>
<button onclick="commitStrings()">Submit</button>

<h3>Result:</h3>
<div id="result"></div>
<button onclick="submitStrings()">Submit</button>


<div id="underlings"></div>
<button onclick="load()" style="margin-top:300px">LOAD</button>
<button onclick="save()">SAVE</button>


  <script src="/socket.io/socket.io.js"></script>
 <script src="https://cdn.socket.io/3.1.3/socket.io.min.js" integrity="sha384-cPwlPLvBTa3sKAgddT6krw0cJat7egBga3DJepJyrLl4Q9/5WLra3rrnMcyTyOnh" crossorigin="anonymous"></script>

<script>


  var ID;
  const socket = io.connect('/')
  let GAMESESSION = "G10.11"
  socket.emit("JOINGAME",GAMESESSION)
  socket.on("acknowledge G10.11",acknowledge)

  function acknowledge(e){
    ID = e
    console.log(e)
  }

const container = document.getElementById("container");


function save() {
    let data = [];

    document.querySelectorAll(".string-box").forEach(box => {
        data.push({
            checked: box.querySelector(".check").checked,
            text: box.querySelector(".string-box-text").value
        });
    });

    localStorage.setItem("stringBoxes", JSON.stringify(data));
}

function load() {
  container.replaceChildren()
    let saved = localStorage.getItem("stringBoxes");

    if (!saved) {
        addBox();
        return;
    }

    let data = JSON.parse(saved);

    data.forEach(item => {
        addBox(item.checked, item.text);
    });
}


function addBox(checked=false,txt="") {
    const row = document.createElement("div");
    row.className = "string-box";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.classList.add("check")
    checkbox.checked = checked

    const text = document.createElement("input");
    text.type = "text";
    text.classList.add("string-box-text")
    text.placeholder = "Enter string...";
    text.value = txt

    row.appendChild(checkbox);
    row.appendChild(text);

    container.appendChild(row);
}

var rand = (x)=>{
  if(x == undefined){return(Math.random())}
  if(x < 1){
    if(x < 0){return(Math.random()*x-x/2)}
    return(Math.random()<x)
  }
  return(Math.random()*x)
}

let str = ""

function commitStrings(){
      let output = [];

    const boxes = document.querySelectorAll(".string-box");

    boxes.forEach(box => {
        const checked = box.querySelector("input[type=checkbox]").checked;
        const text = box.querySelector("input[type=text]").value;

        if (checked) {
            output.push(text);
        }
    });
    str = output.join(" ")
    document.getElementById("result").textContent = str;
}

function submitStrings() {
    socket.emit("DM",str)
}


// optional: start with one box
addBox();


socket.on("underling",(e)=>{
  document.getElementById("underlings").innerText += "\n"+e
})

</script>

</body>
</html>
