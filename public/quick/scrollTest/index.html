<!DOCTYPE html>
<html>
<style>
  body, html {
  overflow: hidden;
  overscroll-behavior: none;
}
</style>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
</head>
<body style="padding:0;margin:0;background-color: #151515;pointer-events: none">
<script>
  
class LCanvas{ 
  constructor(){
    this.canvas = document.createElement("canvas")
    this.ctx = this.canvas.getContext("2d")
    this.canvas.style.position = "fixed"
    this.canvas.style.top = "0px"
    this.canvas.style.left = "0px"
    this.canvas.style.pointerEvents = "none"
    document.body.appendChild(this.canvas)
    return(this)
  }

  fitScreenSize(){
    this.canvas.width = window.innerWidth
    this.canvas.height = window.innerHeight
  }

  clear(){
    this.ctx.clearRect(0,0,this.canvas.width,this.canvas.height)
  }
}




var can = new LCanvas()
can.clear()
can.fitScreenSize()


var lastTime = 0
function mainLoop(){
  requestAnimationFrame(mainLoop)
  let now = performance.now()
  let dt = now-lastTime
  lastTime = now
  can.clear()
  can.ctx.font = "40px arial"
  can.ctx.fillStyle = dt>20?"red":"pink"
  can.ctx.fillText(dt,100,100)
  can.ctx.fillRect(400,100,dt*50,100)

}



requestAnimationFrame(mainLoop)



</script>

</body>
</html>
