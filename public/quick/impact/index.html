<!DOCTYPE html>

<style>
  .mobile{touch-action: none;user-select: none;
-webkit-user-select: none;
-moz-user-select: none;
  overscroll-behavior: none;
  overflow: hidden;
  
}
</style>

<html class="mobile">
<head>
<link rel="icon" href="../../images/psim2.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#151515">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable = no, maximum-scale=1, minimum-scale=1">
  <title>LTPT</title>

</head>
<body style="padding:0;margin:0;background-color: #151515;" class="mobile">
  

<div draggable="false" ondragstart="return false">

<canvas id="myCanvas" disabled="true" style = "z-index: 1;touch-action: none; user-select: none;
-webkit-user-select: none;
-moz-user-select: none;"></canvas>





<script src="sketch.js"></script>
<script src="tests.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .catch((err) => console.error('SW registration failed:', err));
  }
</script>
</body>
</html>
