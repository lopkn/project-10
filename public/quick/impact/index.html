<!DOCTYPE html>

<style>
  .mobile{touch-action: none;user-select: none;
-webkit-user-select: none;
-moz-user-select: none;
  overscroll-behavior: none;
  overflow: hidden;
  
}

  .screen{
    height: 100vh;
    width: 100vw;
    position: fixed;
    top:0px;
    left:0px;
    will-change: transform;
  transform: translateZ(0);
  }

  .notification > * {
    background-color: rgba(220,255,255,0.3);
    font-weight: 100;
    font-size: 3vmin;
    font-family: monospace;
    text-align: center;
    min-width: 30vmin;
    max-width: 75vmin;
    min-height: 3vh;
    height:auto;
    margin:5px;
    margin-left:auto;
    margin-right:auto;
    padding-left: 15px;
    padding-right: 15px;
    overflow: auto;
    position: relative;
    top:0px;
    display: inline-block;

    color:black;
    transition: all 1s;
    border-radius: 5px;
    animation: grow 1s forwards;
    overflow-y: hidden;
  }
  .notification {
    transition: all 1s;
    display: flex;
    align-items: start;
    flex-direction: column;
    justify-content: start;
    overflow-y: hidden;
  }
    @keyframes grow {
        0% {top: -50px; }
        100% { top:0px }
    }

</style>

<html class="mobile">
<head>
<link rel="icon" href="../../images/impact.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#151515">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable = no, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <title>LTPT</title>

</head>
<body style="padding:0;margin:0;background-color: #151515;" class="mobile screen">
  

<div draggable="false" ondragstart="return false">




<div class="screen mobile notification" id="notification_center"></div>



<script src="sprites.js"></script>
<script src="sketch.js"></script>
<script src="tests.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .catch((err) => console.error('SW registration failed:', err));
  }
</script>
</body>
</html>
