<!DOCTYPE html>

<style>


  :root {
  /* Fallback to 0px if the device doesn't have unsafe areas */
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-right: env(safe-area-inset-right, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-left: env(safe-area-inset-left, 0px);

    --bg: rgba(0,0,0,.75);
    --panel: #20242b;
    --panel-light: #2a3038;
    --accent: #4aa3ff;
    --text: white;
    --radius: 18px;
}

  .mobile{touch-action: none;user-select: none;
-webkit-user-select: none;
-moz-user-select: none;
  overscroll-behavior: none;
  overflow: hidden;
}

  .screen{
    height: 100vh;
    width: 100vw;
    position: fixed;
    top:0px;
    left:0px;
  }

  .notification > * {
    background-color: rgba(220,255,255,0.3);
    font-weight: 100;
    font-size: 3vmin;
    font-family: monospace;
    text-align: center;
    min-width: 30vmin;
    max-width: 75vmin;
    min-height: 3vh;
    height:auto;
    margin:5px;
    margin-left:auto;
    margin-right:auto;
    padding-left: 15px;
    padding-right: 15px;
    overflow: auto;
    position: relative;
    top:0px;
    display: inline-block;

    color:black;
    transition: all 1s;
    border-radius: 5px;
    animation: grow 1s forwards;
    overflow-y: hidden;
  }
  .notification {
    transition: all 1s;
    display: flex;
    align-items: start;
    flex-direction: column;
    justify-content: start;
    overflow-y: hidden;
  }
    @keyframes grow {
        0% {top: -50px; }
        100% { top:0px }
    }

</style>

<style>
  
#pauseMenu{
    position:fixed;
    inset:0;
    z-index:100;
    display:none;

    justify-content:center;
    align-items:center;

    background:var(--bg);
    backdrop-filter:blur(6px);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

#pauseMenu.open{
    display:flex;
}

.pause-card{
    width:min(92vw,420px);
    background:var(--panel);
    color:var(--text);

    border-radius:var(--radius);

    padding:28px;

    display:flex;
    flex-direction:column;
    gap:22px;

    box-shadow:
        0 20px 50px rgba(0,0,0,.35);
}

.pause-card h1{
    margin:0;
    text-align:center;
    font-size:clamp(1.6rem,4vw,2.2rem);
}

.section{
    display:flex;
    flex-direction:column;
    gap:10px;
}

label{
    font-size:.95rem;
    opacity:.9;
}

input[type=range]{
    width:100%;
}

button{
    border:none;
    background:var(--panel-light);
    color:white;
    padding:14px;

    border-radius:12px;

    cursor:pointer;

    font-size:1rem;

    transition:.2s;
}

button:hover{
    background:#3b4350;
}

button:active{
    transform:scale(.98);
}

.exit{
    background:var(--accent);
}

.exit:hover{
    background:#67b6ff;
}

@media (max-width:600px){

.pause-card{
    width:90vw;
    padding:24px;
}

button{
    padding:18px;
    font-size:1.05rem;
}

}


</style>

<html class="mobile">
<head>
<link rel="icon" href="../../images/impact.png">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#151515">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable = no, maximum-scale=1, minimum-scale=1, viewport-fit=cover">
  <title>Impact</title>

</head>
<body style="padding:0;margin:0;background-color: #151515;" class="mobile screen">
  

<div draggable="false" ondragstart="return false">




<div class="screen mobile notification" id="notification_center"></div>



<script src="sprites.js"></script>
<script src="sketch.js"></script>
<script src="tests.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./service-worker.js')
      .catch((err) => console.error('SW registration failed:', err));
  }
</script>
</body>
</html>
