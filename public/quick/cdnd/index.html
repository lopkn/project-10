<script>

function normalRandom(mean, stderr, y,id) {
    const u1 = strand("saltex"+y+id);
    const u2 = strand("saltfax"+y);

    const z0 = Math.sqrt(-2.0 * Math.log(u1)) * Math.cos(2.0 * Math.PI * u2);
    return z0 * stderr + mean;
}


  var rand = (x,y,id)=>{
    let r = strand("salt1"+y+id)
  if(x == undefined){return(r)}
  if(x < 1){
    if(x < 0){return(r*x-x/2)}
    return(r<x)
  }
  return(r*x)
}

var floor = Math.floor
var round = Math.round

function strand(str) {
    let h1 = 1779033703, h2 = 3024733165, h3 = 3362453659, h4 = 2149076054;
    for (let i = 0, k; i < str.length; i++) {
        k = str.charCodeAt(i);
        h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
        h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
        h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
        h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    
    // Mix the bits and convert to a 32-bit unsigned integer, then divide to get 0 to 1 float
    const finalInt = (h1 ^ h2 ^ h3 ^ h4) >>> 0;
    return finalInt / 4294967296; 
}

  var ID;
  var tickcounter = 0;
  const socket = io.connect('/')
  let GAMESESSION = "G10.11"
  socket.emit("JOINGAME",GAMESESSION)
  socket.on("acknowledge G10.11",acknowledge)

  let name = prompt("Whats your name?")
  // let name = "test"
  document.getElementById("titl").innerText = "Skilled gambling: "+name

  function acknowledge(e){
    ID = e
    console.log(e)
  }

  let clickable = false


  let clickables = []


  socket.on("DM",(e)=>{console.log(e); myParse(e)})

  var container = document.getElementById("container")
  var container2 = document.getElementById("container2")


  var startTime = 0

  function myParse(str){


    startTime = Date.now()
    setTimeout(()=>{clickable = true},2000);
    clickables = []
    container.replaceChildren()
    document.getElementById("overlay").replaceChildren()
    document.getElementById("overlay").style.backgroundColor = "rgba(0,0,0,0)"

    container.innerText = ""
    container2.innerText = ""
    let arr = str.split(" ")
    arr.forEach((e,i)=>{

      let sep = e.split("/")

      let name = sep[1]

      e = sep[0]

      let clickable;

      if(e[0]==="d"){
        let num = parseFloat(e.slice(1))
        clickable = createD(i,num)
      } else if(e[0] === "n"){
        let str = e.slice(1)
        clickable = createN(i,...str.split(","))
      } else if(e === "reload"){
        location.reload()
      } else if(e.slice(0,3)==="sin"){
        let str = e.slice(3)
        clickable = createSin(i,...str.split(","))
      } else if(e.slice(0,11)==="latePenalty"){
        clickable = {ticked:()=>{},clicked:()=>{return(Date.now()-startTime>90000?-parseFloat(e.slice(11)):0)},nodisp:true}
        clickables.push(clickable)
      }else if(e==="adv"||e==="advantage"||e==="advantaged"){
        clickable = {ticked:()=>{},clicked:()=>{return(3.325)},name:"advantaged"}
        clickables.push(clickable)
      }else if(e==="dis"||e==="disadvantage"||e==="disadvantaged"){
        clickable = {ticked:()=>{},clicked:()=>{return(-3.325)},name:"disadvantaged"}
        clickables.push(clickable)
      }
      clickable.command = e
      clickable.name = name
    })
  }


























    function createSin(id,min=-1,max=1,speed=1){
    let clickable = {}
    min = parseFloat(min)
    max = parseFloat(max)
    clickable.min = min
    clickable.max = max
    clickable.mid = (max+min)/2
    clickable.mag = max-clickable.mid
    clickable.range = max-min
    clickable.speed = 1000*speed
    clickable.id = id
    clickable.clicked = (e)=>{return(e.value)}

    clickable.evaluate = (x)=>{
      return((x-clickable.mid)/clickable.mag)
    }

    let par = document.createElement("div")
    par.classList.add("slidecontainer")
    let range = document.createElement("input")
    range.classList.add("slider")
    range.type="range"
    range.step = "any"
    range.min = min
    range.max = max
    clickable.ticked = (e,d)=>{

      e.value = clickable.max-Math.abs(Math.sin(d/clickable.speed*Math.PI*2))*clickable.range
      range.value = Math.sin(d/clickable.speed*Math.PI*2)*clickable.mag+clickable.mid
      // console.log(range.value,clickable.mid)
    }
    clickable.elm = par

    clickables.push(clickable)

    par.appendChild(range)

    let nod = document.createElement("div")
    nod.classList.add("slider-labels")

    let labarr = [min,max,min]
    labarr.forEach((e)=>{
      let s = document.createElement("span")
      s.innerText = e
      nod.appendChild(s)
    })


    par.appendChild(nod)
    container2.appendChild(par)
    return(clickable)
  }



  function createD(id,n){
    let clickable = {}
    clickable.num = n
    clickable.id = id
    clickable.clicked = (e)=>{return(e.value)}

    clickable.evaluate = (x)=>{
      // let max = n<0?-n-1:n
      let max = Math.abs(n)
      let min = Math.min(1,n+1)
      let mid = (max+min)/2
      let range = max-mid
      return((x-mid)/range)
    }

    let par = document.createElement("div")
    par.classList.add("column")
    clickable.ticked = (e,d)=>{
      if(tickcounter%2===0){return}

      e.value = floor(rand(e.num,d,e.id))+1
      let chi = document.createElement("div")
      chi.innerText = e.value

      chi.classList.add("highlight")

      if(par.lastElementChild){
        par.lastElementChild.classList.remove("highlight")
        let ev = e.evaluate(parseFloat(par.lastElementChild.innerText))
        par.lastElementChild.style.color = `rgb(${-ev*255},${ev*255},255)`
      }
      par.appendChild(chi)

      while (par.children.length > 10) {
          par.removeChild(par.firstElementChild);
      }
    }
    clickable.elm = par

    clickables.push(clickable)
    container.appendChild(par)
    return(clickable)
  }

    function createN(id,m,s){
    let clickable = {}
    m = parseFloat(m)
    s = parseFloat(s)
    clickable.m = m
    clickable.s = s
    clickable.id = id
    clickable.clicked = (e)=>{return(e.value)}

    let par = document.createElement("div")
    par.classList.add("column")
    clickable.ticked = (e,d)=>{
      if(tickcounter%2===0){return}
      e.value = round(normalRandom(m,s,d,e.id))
      let chi = document.createElement("div")
      chi.innerText = e.value

      chi.classList.add("highlight")

      if(par.lastElementChild){
        par.lastElementChild.classList.remove("highlight")
      }
      par.appendChild(chi)

      while (par.children.length > 10) {
          par.removeChild(par.firstElementChild);
      }
    }
    clickable.elm = par

    clickables.push(clickable)
    container.appendChild(par)
    return(clickable)

  }

  let spammable = 10;


  document.addEventListener("click",(e)=>{
    spammable -=1
    if(spammable > 0){return}
    if(!clickable){return}
    let res = clicked()
    socket.emit("underling",name+","+res)
  })

    document.addEventListener("keydown",(e)=>{
    if(e.key!=="Enter"){return}
    if(!clickable){return}
    let res = clicked()
    socket.emit("underling",name+","+res)
  })

  function clicked(){
    spammable = 10
      clickable=false
    let sum = 0
    let arr = []
    clickables.forEach((e)=>{
      let n = e.clicked(e,Date.now())
      sum += n
      if(n!==0 || !e.nodisp ){
        arr.push(n)
      }
      e.ticked = ()=>{}
    })
    for(let i = 0; i < 300; i++){
      setTimeout(()=>{
        document.body.style.backgroundColor = `rgb(0,${255-i/300*255},0)`
      },i*10)
    }

    let elmarr = []

    arr.forEach((e,i)=>{
      let d = document.createElement("div")
      let str = clickables[i].command
      if(clickables[i].name){
        str = clickables[i].name.replaceAll("_"," ")
      }
      while(str.length<15){str += " "}
      d.innerText = str+(parseFloat(e)<0?" ":" +")+(+e.toFixed(4))
      d.style.whiteSpace = "pre"
      elmarr.push(d)
    })
    let d = document.createElement("div")
    d.innerText = "FINAL SUM:  "+ (+sum.toFixed(4))
    d.style.whiteSpace = "pre"
            d.style.fontSize = "1.4em"
    elmarr.push(d)

      for(let i = 0; i < elmarr.length; i++){
        let e = elmarr[i]
        document.getElementById("overlay").appendChild(e)
        e.style.color="transparent"
        if(i === elmarr.length-1){
          setTimeout(()=>{
            e.style.color = "gold"
            e.style.fontWeight = "bold"
            document.getElementById("overlay").style.backgroundColor = "rgba(0,0,0,0.7)"
          },2700+i*150)
          continue
        }

        setTimeout(()=>{
          e.style.color = "white"
          document.getElementById("overlay").style.backgroundColor = "rgba(0,0,0,0.5)"
        },2500+i*150)
    }


    return(sum)
  }

  setInterval(()=>{
    tickcounter++;
    let dn = Date.now()
    clickables.forEach((e)=>{
      e.ticked(e,dn)
    })

  },35)

// myParse("d-20 d10 d10 d4 n40,5 sin0,5,2 sin0,5,3 sin0,15,2.2 latePenalty5")
  myParse("sin-5,0,3")
</script>
