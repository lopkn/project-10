  <div id="log" style="position:absolute; width:100vw; height:100vh; top:0px; left:0px; color:lime"></div>

<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.21.0/dist/lil-gui.umd.min.js"></script>

</style>
<script>
  const GUI = lil.GUI;

  const midiToNote = (midi) => {
    const noteNames = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    const note = noteNames[midi % 12];
    const octave = Math.floor(midi / 12) - 1;
    return `${note}${octave}`;
  };



  function mtn(midiNumber) {
    return Tone.Frequency(midiNumber, "midi");
  }

  var bell;

  function soundInit(){
    const synth = new Tone.Synth().toDestination();

    bell = new Tone.Sampler({
      urls: {
        "C4":"../epcounter/untitled.mp3",
      },
    }).toDestination();


    reverb = new Tone.Reverb({
      decay: 20, // Duration of the reverb tail
      preDelay: 0.3,
      wet: 0.95,
      input:1,
      output:1
    }).toDestination();

    echo = new Tone.PingPongDelay(0.3*2, 0.3*2).toDestination();
    eq = new Tone.EQ3(-10, 3, 0);


    bell.connect(reverb)
    bell.connect(echo)
    bell.connect(eq)
    bell.set({volume:-20})


      setTimeout(()=>{
          const now = Tone.now()
          start(now)
      },200)
  }

  var rand = (x)=>{
  if(x == undefined){return(Math.random())}
  if(x < 1){
    if(x < 0){return(Math.random()*x-x/2)}
    return(Math.random()<x)
  }
  return(Math.random()*x)
}

function ranarr(...args){
  const arr = (args.length === 1 && Array.isArray(args[0])) ? args[0] : args;
  return(arr[Math.floor(Math.random()*arr.length)])
}


  function start(now){
    // bell.triggerAttackRelease(mtn(60), 1.7, now);
    // chord(20,20)
    startInfinite(chord(20,20))
  }

  function play(arr){
    let now = Tone.now()
    arr.forEach((e,i)=>{
      bell.triggerAttackRelease(mtn(e), 1.7, now+i*0.3/3);
    })
  }


  collider = {
    dist:25,
    chance:[1,1,0,0],
    length:12,
    attempts:50,
    sort:false
  }
  function collide_AI(x, y, arr=collider.chance) {

    if(Math.abs(x-y) > collider.dist){return(false)}

    const diff = Math.abs((x % 12) - (y % 12));
    
    // Find the index corresponding to the step distance (1-based index)
    // A diff of 0 or 6 can only map to one distance, while others (like 1 and 11) 
    // map to the same distance on a 12-note circular wheel.
    const distance = Math.min(diff, 12 - diff);
    
    // If the distance is 0 or out of the array's bounds, it's 0% chance
    if (distance === 0 || distance > arr.length) {
        return false;
    }
    
    // The array is 0-indexed, so distance 1 maps to index 0, distance 2 to index 1, etc.
    const probability = arr[distance - 1];
    
    return Math.random()<probability;
}


  function collide(x,y){
    if(Math.abs(x-y)>25){return(false)}
    x = x-Math.floor(x/12)*12
    y = y-Math.floor(y/12)*12

    let diff = Math.abs(x-y)



    if(Math.abs(x-y) === 1 || Math.abs(x-y) === 2){
      return(true)
    }
    return(false)
  }

  function collideArr(x,arr,f=collide){
    let collided = false
    arr.forEach((e)=>{
      collided |= f(x,e)
    })
    return(collided)
  }



  function checkCollide(note,arr,dist=1){

    let mod = note%12
    for(let i = 0; i < arr.length; i++){
      let resd = Math.abs(arr[i]-mod)%12
      if(resd == dist || resd == 12-dist){
        return(true)
      }
    }
    return(false)
  }

  function attemptAddToChord(x,r,arr){
    let collided = true
    let tr;
    let i= 0
    while(collided && i < 500){
      i++
      tr = r()
      collided = checkCollide(x+tr,arr) 
    }

    if(i==500){
      console.warn("maximum exceeded")
    }
    return(x+tr)
  }

  function chord(x,y){
    let arr = []
    for(let i = 0; i < y; i++){
      x = attemptAddToChord(x,()=>{return(ranarr(1,2,3,4,5))},arr)
      arr.push(x)
    }
    console.log(arr)
    play(arr)
    return(arr)
  }

  document.addEventListener("keydown",(e)=>{
    if(e.key==="r"){
      start(Tone.now())
    }
    if(e.key==="e"){
      startInfinite(chord(20,20))
    }
  })

  function change(arr,times=5){
    let i = Math.floor(Math.random()*arr.length)
    let x = arr.splice(i,1)


      let z = x[0] + (ranarr(1,2,3,-1,-2,-3)*1)
    for(let i = 0; i < times && (collideArr(z,arr) || arr.includes(z)); i++){
      let dz = (ranarr(1,2,3,-1,-2,-3)*1)
      if(z > 90){
        dz = -Math.abs(dz)
      }
      if(z < 30){
        dz = Math.abs(dz)
      }
      z = x[0]+dz
    }

    // console.log(z,x[0])


    if(!collideArr(z,arr) && !arr.includes(z)){arr.push(z);return(true)}else{arr.push(x[0])}
  }

  let marr;

  function startInfinite(arr){
    // setInterval(()=>{
    //   arr.sort()
    //   console.log(arr)
    //   let cray = [ranarr(arr)]
    //   play(cray)
    //   change(arr)
    // },0.3/2*1000)


    setInterval(()=>{

      let note = arr[0]
      let i = 0;
      while(i < collider.attempts && collideArr(note,arr,collide_AI) || arr.includes(note)){
        note = Math.floor(20+rand()*70)
        i++
      }
      if(i==collider.attempts){console.log("hit"); note = ranarr(arr)}
      arr.push(note)
      while(arr.length > collider.length){
        arr.splice(0,1)
      }

      play([note])

      const detectedChords = Tonal.Chord.detect(arr.map(midiToNote));

      let ttarr = [...arr]
      if(collider.sort){
        ttarr.sort()
      }
      let cl = ""
      for(let i = 20; i < 80; i++){
        cl += collideArr(i,ttarr,collide_AI)?"-":"+"
      }

      let txt = document.getElementById("log").innerText + "\n"+JSON.stringify(ttarr) + " " +cl+"  DETECTOR:------>"+JSON.stringify(detectedChords)

      let tarr = txt.split("\n")
      while(tarr.length > 30){
        tarr.splice(0,1)
      }
      txt = tarr.join("\n")
      document.getElementById("log").innerText = txt

 

    },0.3/3*1000)
  }












const gui = new GUI({ title: 'Gen Controls' })

gui.add(collider,"sort").name("sort")
gui.add(collider,"dist",0,90,1).name("distance of strikedown")
gui.add(collider,"attempts",5,200,1).name("gen attempts/conformity")
gui.add(collider,"length",5,20,1).name("memory")
gui.add(collider.chance,"0",0,1,0.01).name("strikedown chance 1 step collision")
gui.add(collider.chance,"1",0,1,0.01).name("strikedown chance 2 step collision")
gui.add(collider.chance,"2",0,1,0.01).name("strikedown chance 3 step collision")
gui.add(collider.chance,"3",0,1,0.01).name("strikedown chance 4 step collision")

</script>
