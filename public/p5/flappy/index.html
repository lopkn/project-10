<script>




  /// gpu things
  // const gpu = new window.GPU.GPU()
  //   const kernel = gpu.createKernel(function(x,y) {
  //     return x[this.thread.x];
  //   }, {output: {x: 100}});

  //console.log(kernel([1,2,100]))
  /// gpu things

  var Width = window.innerWidth
  var Height = window.innerHeight
  var scrMax = Math.max(Width,Height)
  var w2 = Width/2
  var h2 = Height/2


function setup() {
  createCanvas(window.innerWidth, window.innerHeight);
  frameRate(60)

}




var particles = []

var bird ={
  y:Height/2,
  vy:0
}



var distt = 0

var pillars = []
for(i = 0; i < 2000; i++){
  pillars.push(Math.random()*Height)
}

var colliding =false
var collisions =0

function draw() {
  background(255,255,255);

  //draw bird
  bird.vy += 0.04
  bird.y += bird.vy

  distt += 2
  noStroke()
  
  fill(0)
  pillars.forEach((e,i)=>{
    rect(i*400-distt+Width,0,120,height)
  })
  fill(255)
  pillars.forEach((e,i)=>{
    rect(i*400-distt+Width,e-60,120,120)
  })
  fill(0,255,0)
  ellipse(150,bird.y,50,50)

  var a = (distt-Width+50+130)%400
  if(a < 160 && a > 0){
    if(colliding == false){
      colliding = true
      collisions +=1 
    }

      if(Math.abs(bird.y-pillars[collisions-1]) < 36 && collisions > 0){

      } else {
        // background(255,0,0)
        die()
      }

  } else {
      colliding = false
  }

}

function die(){
  noLoop()
}

document.addEventListener("keydown",(e)=>{
  if(e.key ==" " && !e.repeat){
    bird.vy = min(0,bird.vy)
    bird.vy -= 2
    bird.vy = max(bird.vy,-4)
  }
})
</script>
