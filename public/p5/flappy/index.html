<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="../../images/psim2.png">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable = no, maximum-scale=1, minimum-scale=1">
  <title>flappy blob</title>

</head>
<body style="padding:0;margin:0;background-color: black;">

  <div draggable="false" ondragstart="return false">

	  <script src="../p5.js"></script>



<script>





  var Width = window.innerWidth
  var Height = window.innerHeight


function setup() {
  createCanvas(window.innerWidth, window.innerHeight);
  frameRate(60)

}



var bird ={
  y:Height/2,
  vy:0
}



var distt = 0

var pillars = []
for(i = 0; i < 2000; i++){
  pillars.push(20+Math.random()*(Height-40))
}

var colliding =false
var collisions =0
var pillarDist =600

var birdPoop = []

var down = 0
function draw() {
  background(255,255,255);


  //draw bird
  bird.vy += 0.08 + 0.18 * down
  bird.y += bird.vy
  if(bird.y > Height+25){
    bird.y = 0
  }
  if(bird.y < -25){
    bird.y = Height
  }
  birdPoop.splice(0,0,bird.y)

  if(birdPoop.length>50){
    birdPoop.pop()
  }


  distt += 6
  noStroke()
  
  fill(0)
  pillars.forEach((e,i)=>{
    rect(i*pillarDist-distt+Width,0,120,height)
  })
  fill(255)
  pillars.forEach((e,i)=>{
    rect(i*pillarDist-distt+Width,e-60,120,120)
  })
  fill(125,0,255)
  birdPoop.forEach((e,i)=>{
    fill(125-i*4,i*6,255,255-i*16)
    ellipse(150-i*6,e,50,50)
  })
  ellipse(150,bird.y,50,50)
  fill(125,0,255)
  text("score:"+collisions,0,120)

  var a = (distt-Width+50+125)%pillarDist
  if(a < 160 && a > 0){
    if(colliding == false){
      colliding = true
      collisions +=1 
    }

      if(Math.abs(bird.y-pillars[collisions-1]) < 36 && collisions > 0){

      } else {
        die()
      }

  } else {
      colliding = false
  }

}

function die(){
  noLoop()
}

document.addEventListener("keydown",(e)=>{
  if(e.key ==" " && !e.repeat){
    bird.vy = min(0,bird.vy)
    bird.vy -= 3
    bird.vy = max(bird.vy,-8)
  }
  if(e.key == "Shift"){
    down = 1
  }
})

document.addEventListener("keyup",(e)=>{
  if(e.key == "Shift"){
    down = 0
  }
})


</script>

</body>
</html>
