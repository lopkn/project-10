<script>

  /// gpu things

  var Width = window.innerWidth
  var Height = window.innerHeight
  var scrMax = Math.max(Width,Height)
  var w2 = Width/2
  var h2 = Height/2


function setup() {
  createCanvas(window.innerWidth, window.innerHeight);
}


function ranArr(arr){
  return(arr[Math.floor(Math.random()*arr.length)])
}



var rand = (x)=>{
  if(x == undefined){return(Math.random())}
  if(x < 1){return(Math.random()<x)}
  return(Math.random()*x)
}

let particles = []


class explosion{
  constructor(x,y,s){
    this.x=x
    this.y=y
    this.size=s
    this.life=100
    
    this.colrand =rand(255)
  }
  
  update(){
    this.life-=1
    if(this.life<=0){
      return("del")
    }
  }
  
  draw(){
    noStroke()
    fill(0,this.colrand,255,(this.life)*2.55)
    circle(this.x,this.y,((100-this.life))**0.5*this.size)
  }
}

let rnd = rand(255)

function draw() {
    background(rnd);
  for(let i = particles.length-1; i > -1; i--){
    let e = particles[i]
    if(e.update()=="del"){particles.splice(i,1);continue;}
    e.draw()
  }
  if(Math.random()>1-Width*Height/1600000){
    particles.push(new explosion(rand(Width),rand(Height),rand(400/10)))
  }
}
</script>
