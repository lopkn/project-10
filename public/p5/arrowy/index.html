  var Width = window.innerWidth
  var Height = window.innerHeight
  var scrMax = Math.max(Width,Height)
  var w2 = Width/2
  var h2 = Height/2


function setup() {
  createCanvas(window.innerWidth, window.innerHeight);
}


function ranArr(arr){
  return(arr[Math.floor(Math.random()*arr.length)])
}



var rand = (x)=>{
  if(x == undefined){return(Math.random())}
  if(x < 1){return(Math.random()<x)}
  return(Math.random()*x)
}


class liney{
  constructor(x,y,tx,ty,s=1,c=cf.dbg){
    this.x = x
    this.y = y
    this.tx = tx
    this.ty = ty
    this.color = c
    
    this.vx = tx-x
    this.vy = ty-y
    
    this.life = 100
    this.speed = s
    
    this.angle=Math.PI-0.3
  }
  
  update(){
    this.life -= this.speed
    if(this.life < 0){return("del")}
  }
  
  draw(){
    stroke(this.color(this.life))
    line(this.x,this.y,this.tx,this.ty)
    
    let px = this.tx - this.vx*this.life/100
    let py = this.ty - this.vy*this.life/100
    
    let p1 = Lrotate(this.vx/10,this.vy/10,this.angle)
    line(px,py,px+p1.x,py+p1.y)
    let p2 = Lrotate(this.vx/10,this.vy/10,-this.angle)
    line(px,py,px+p2.x,py+p2.y)
  }
}

function Lrotate(x,y,d){
  return({
    x: x*Math.cos(d) - y*Math.sin(d),
    y: x*Math.sin(d) + y*Math.cos(d)
  })
}

cf = {
  "dbg":(x)=>{return(color(Math.random()*255,0,Math.random()*255))}
}



let particles = [new liney(0,0,400,400)]


function draw() {
  background(220);
  for(let i = particles.length-1; i > -1; i--){
    let e = particles[i]
    if(e.update()=="del"){particles.splice(i,1);continue;}
    e.draw()
  }
  if(Math.random()>0.6){
    particles.push(new liney(rand(Width),rand(Height),rand(Width),rand(Height),rand(2)+1))
  }
}
</script>
