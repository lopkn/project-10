<script>




  /// gpu things
  // const gpu = new window.GPU.GPU()
  //   const kernel = gpu.createKernel(function(x,y) {
  //     return x[this.thread.x];
  //   }, {output: {x: 100}});

  //console.log(kernel([1,2,100]))
  /// gpu things

  var Width = window.innerWidth
  var Height = window.innerHeight
  var scrMax = Math.max(Width,Height)
  var w2 = Width/2
  var h2 = Height/2


  var hist = []

  function solve(){
    let d = {}
    hist.forEach((e)=>{
      if(d[e]==undefined){d[e]=false}
        d[e] = !d[e]
    })
    return(d)
  }


function setup() {
  createCanvas(window.innerWidth, window.innerHeight);

}

let size = Math.min(Math.floor(Width/7),Math.floor(Height/5))


let dict = {}
  for(let i = 0; i < 7; i++){
    for(let j = 0; j < 5; j++){
      dict[i+","+j] = Math.random()>0.5
    }
  }

function clearBoard(){
    for(let i = 0; i < 7; i++){
    for(let j = 0; j < 5; j++){
      dict[i+","+j] = 0
    }
  }
}

let md = 0

function draw() {
  stroke(0,120,40)
  background(220);
    for(let i = 0; i < 7; i++){
    for(let j = 0; j < 5; j++){
      fill(dict[i+","+j]?255:0)
      rect(i*size,j*size,size,size)
    }
  }
  if(mouseIsPressed){
    if(md == 0){md = 1;
      let x = Math.floor(mouseX/size)           
      let y = Math.floor(mouseY/size)     
      
      let arr = [[x,y],[x+1,y],[x-1,y],[x,y+1],[x,y-1]]
      if(dict[x+","+y]===undefined){return} else {
        hist.push(x+","+y)
      }
      arr.forEach((e)=>{
        if(dict[e[0]+","+e[1]] !== undefined){
          dict[e[0]+","+e[1]] = !dict[e[0]+","+e[1]]
        }
      })
      
    }
  } else {md = 0}
}
</script>
