  var Width = window.innerWidth
  var Height = window.innerHeight
  var scrMax = Math.max(Width,Height)
  var w2 = Width/2
  var h2 = Height/2

function setup() {
  createCanvas(400, 400);
}

let arr = []
let last = -1
let col = false
let size = 10
let bsize = 10

function draw() {
  background(220);
  
  for(let i = 0; i < size; i++){
    for(let j = 0; j < size; j++){
      fill(arr[i+j*size]?0:255)
      square(i*bsize,j*bsize,bsize)
    }
  }
  if(mouseIsPressed){
    let px = Math.floor(mouseX/bsize)
    let py = Math.floor(mouseY/bsize)
    if(px>=size || py>= size || px < 0 || py<0){return}
    
    let i = px+py*size
    if(last == -1){col=arr[i]?false:true}
    if(i!=last){last=i; arr[i]=col}
  } else {last = -1}
}

function standard(){for(let i = 0; i < size**2; i++){arr[i]=arr[i]?1:0}}
  
function diff(str1, str2) {
  // Convert strings to BigInts (binary base 2)
  const xorResult = BigInt('0b' + str1) ^ BigInt('0b' + str2);
  
  // Count '1's in the resulting binary string
  return xorResult.toString(2).split('1').length - 1;
}
  
function diffAt(s1,s2){
  let out = []
  for(let i = 0; i < s1.length; i++){
    if(s1[i]!==s2[i]){out.push(i)}
  }
  return(out)
}
  
  
class n{
  constructor(size,mem){
    this.mem = mem
    this.size = size
  }
  
  cal(str){
    return(1-diff(str,this.mem)/this.size)
  }
}

class merger{
  constructor(){
    
  }
}
  
var latest;
  
document.addEventListener("mouseup",(e)=>{
  standard()
})
document.addEventListener("keydown",(e)=>{
  if(e.key=="/"){
    let s = arr.join("")
    console.log(s)
    let tn = new n(size**2, s)
    if(latest!==undefined){
      tn = merger(tn,latest)
    }
    latest = tn
  }
  if(e.key=="."){
    console.log(latest.cal(arr.join("")))
  }
})


</script>
