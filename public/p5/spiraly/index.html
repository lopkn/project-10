<script>




  /// gpu things
  // const gpu = new window.GPU.GPU()
  //   const kernel = gpu.createKernel(function(x,y) {
  //     return x[this.thread.x];
  //   }, {output: {x: 100}});

  //console.log(kernel([1,2,100]))
  /// gpu things

  var Width = window.innerWidth
  var Height = window.innerHeight
  var scrMax = Math.max(Width,Height)
  var w2 = Width/2
  var h2 = Height/2

function setup() {
  createCanvas(Width, Height);
}

var rand = (x)=>{
  if(x == undefined){return(Math.random())}
  if(x < 1){return(Math.random()<x)}
  return(Math.random()*x)
}

class liney{
  constructor(x,y){
    this.x = x; this.y = y;
    this.vx = this.vy = 0;
    this.life = 100+rand(2000);
    this.tail = []
    this.tailLength = 200

    this.size = rand(9)+1

    this.angular = 0
  }
  
  update(){
    if(this.life <= 0){
      this.tail.splice(0,1)
      if(this.tail.length==0){
        return("del")
      }
      return;
    }

    this.life -= 1
    
    //make tail
    
    this.tail.push([this.x,this.y])
    
    //update phys
    this.x += this.vx
    this.y += this.vy
    
    if(this.y > Height/2){
      this.vy -= Math.random()
    }

    this.angular += (((Height-this.y)/Height)**2)*(rand()-0.5) * 0.5
    this.angular *= 0.97

    let rotate = Lrotate(this.vx,this.vy,this.angular)
    this.vx = rotate.x
    this.vy = rotate.y



    
    while(this.tail.length>this.tailLength){
      this.tail.splice(0,1)
    }
  }
  
  draw(){
    strokeWeight(this.size)
    for(let i = this.tail.length-2; i > -1; i--){
      let e = this.tail[i]
      let t = this.tail[i+1]

      let l = (i+1)/this.tail.length*255
      stroke(0,l,0)
      line(e[0],e[1],t[0],t[1])
    }
  }
}


function Lrotate(x,y,d){
  return({
    x: x*Math.cos(d) - y*Math.sin(d),
    y: x*Math.sin(d) + y*Math.cos(d)
  })
}

let particles = []

function draw() {
    background(220);
  for(let i = particles.length-1; i > -1; i--){
    let e = particles[i]
    if(e.update()=="del"){particles.splice(i,1);continue;}
    e.draw()
  }
  if(Math.random()>0.96&& Date.now()%120000 > 13000){
    particles.push(new liney(rand(Width),Height))
  }
}
</script>
