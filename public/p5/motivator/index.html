<script>


  var Width = window.innerWidth
  var Height = window.innerHeight
  var scrMax = Math.max(Width,Height)
  var w2 = Width/2
  var h2 = Height/2


function setup() {
  createCanvas(window.innerWidth, window.innerHeight);
  frameRate(60)
  colorMode(HSL,100,100,100,255)
  textAlign(CENTER)

}


function intersects(a,b,c,d,p,q,r,s) {
  var det, gamma, lambda;
  det = (c - a) * (s - q) - (r - p) * (d - b);
  if (det === 0) {
    return false;
  } else {
    lambda = ((s - q) * (r - a) + (p - r) * (s - b)) / det;
    gamma = ((b - d) * (r - a) + (c - a) * (s - b)) / det;
    if ( (0 < lambda && lambda < 1) && (0 < gamma && gamma < 1) ) {
      return([a+lambda*(c-a),b+lambda*(d-b)])
    };
    return(false)
  }
};

class phys{
  constructor(x=Width/2,y=Height+10){
    this.x = x
    this.y = y
    this.vx = 0
    this.vy = -0.5 - Math.random()

    this.life = 2000
    this.txt = motiv()

    this.timely = 100 - Math.random()*80
    this.timeAdd = Math.random()*2*Math.PI
    this.size = 26 + Math.random()*20

  }
  update(me,dt=1){
    this.x += this.vx*dt
    this.y += this.vy*dt



    this.vx += Math.random()*0.1-0.05

    this.life -= dt
    if(this.life<0){return "delete"}

    // let d = dist(this.x,this.y,w2,h2)
    // this.vx -= (this.x-w2)/(d+1)*0.5
    // this.vy -= (this.y-h2)/(d+1)*0.5

  }

  draw(){
    // circle(this.x,this.y,10)
    textSize(this.size)


    let a = Math.sin(this.life/this.timely+this.timeAdd)/1.8

    fill(Math.random()*360,100,50)
    translate(this.x,this.y)
    rotate(a)
    text(this.txt,0,0)
    rotate(-a)
    translate(-this.x,-this.y)
  }
}

var rand = (x)=>{
  if(x == undefined){return(Math.random())}
  if(x < 1){return(Math.random()<x)}
  return(Math.random()*x)
}


var particles = []


function draw() {
  background(120,0,0);

  if(Math.random()>0.95){
    particles.push(new phys())
  }

  for(let i = particles.length-1; i>-1; i--){
    if(particles[i].update(particles[i])=="delete"){
      particles.splice(i,1)
      continue;
    }
    particles[i].draw(particles[i])
  }
  
}
